<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test couleurs — Our Space</title>
  <style>
    :root {
      --bg: #1f2229;
      --surface: #282c35;
      --text: #f0f2f5;
      --muted: #a8b0bd;
      --neu-up-sm: -3px -3px 8px rgba(255, 255, 255, 0.04), 3px 3px 8px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 28px 20px 48px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 14px;
    }

    .swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px 12px 14px;
      border-radius: 16px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      color: inherit;
      font: inherit;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .swatch:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--c) 35%, transparent);
    }

    .swatch.is-copied .icon-wrap {
      box-shadow: var(--neu-up-sm), 0 0 22px color-mix(in srgb, var(--c) 45%, transparent);
    }

    /* Même rendu que .page-header-mobile-icon */
    .icon-wrap {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: var(--neu-up-sm), 0 0 16px color-mix(in srgb, var(--c) 20%, transparent);
      color: var(--c);
    }

    .icon-wrap svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .name {
      font-size: 0.78rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.25;
      color: var(--c);
    }

    .hex {
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-size: 0.82rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 10;
    }

    .toast.is-on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <h1>50 couleurs — icône header accueil</h1>
  <p class="sub">Rond gris <code>#282c35</code> + icône colorée (comme en haut à gauche) — clic = copie hex</p>

  <div class="grid" id="grid"></div>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 10.5 12 3l9 7.5"/>
        <path d="M5 10v10h14V10"/>
        <path d="M10 20v-6h4v6"/>
      </svg>
    `;

    const COLORS = [
      { name: 'Hot Pink', hex: '#e40077' },
      { name: 'Hot Pink Bright', hex: '#ff1493' },
      { name: 'Magenta Pop', hex: '#ff0090' },
      { name: 'Ruby Flash', hex: '#ff0066' },
      { name: 'Cerise', hex: '#de3163' },
      { name: 'Crimson', hex: '#dc143c' },
      { name: 'Scarlet', hex: '#ff2400' },
      { name: 'Vermilion', hex: '#e34234' },
      { name: 'Coral Punch', hex: '#ff5a36' },
      { name: 'Tangerine', hex: '#ff7a00' },
      { name: 'Amber Fire', hex: '#ff8c00' },
      { name: 'Gold Pop', hex: '#ffb000' },
      { name: 'Chartreuse', hex: '#b8e600' },
      { name: 'Lime Electric', hex: '#a8ff00' },
      { name: 'Spring Green', hex: '#00ff7f' },
      { name: 'Mint Neon', hex: '#00ffb9' },
      { name: 'Aqua Flash', hex: '#00e5c0' },
      { name: 'Teal Bright', hex: '#00c2a8' },
      { name: 'Cyan Electric', hex: '#00e5ff' },
      { name: 'Sky Vivid', hex: '#00afff' },
      { name: 'Azure', hex: '#007fff' },
      { name: 'Royal Blue', hex: '#4169e1' },
      { name: 'Ultramarine', hex: '#3f00ff' },
      { name: 'Indigo Vivid', hex: '#5b4dff' },
      { name: 'Violet Electric', hex: '#7c3aed' },
      { name: 'Purple Neon', hex: '#a020f0' },
      { name: 'Orchid', hex: '#da70d6' },
      { name: 'Fuchsia', hex: '#d946ef' },
      { name: 'Pink Neon', hex: '#ff4ecd' },
      { name: 'Rose Vivid', hex: '#ff2d55' },
      { name: 'Watermelon', hex: '#fc6c85' },
      { name: 'Salmon Bright', hex: '#ff6f61' },
      { name: 'Peach Neon', hex: '#ff8e72' },
      { name: 'Mango', hex: '#ffb347' },
      { name: 'Lemon Zest', hex: '#ffe135' },
      { name: 'Yellow Neon', hex: '#ffff33' },
      { name: 'Acid Green', hex: '#39ff14' },
      { name: 'Emerald Pop', hex: '#00d26a' },
      { name: 'Jade', hex: '#00a86b' },
      { name: 'Sea Green', hex: '#2e8b57' },
      { name: 'Turquoise', hex: '#40e0d0' },
      { name: 'Capri', hex: '#00bfff' },
      { name: 'Dodger', hex: '#1e90ff' },
      { name: 'Periwinkle', hex: '#8f9bff' },
      { name: 'Lavender Pop', hex: '#b794f6' },
      { name: 'Grape', hex: '#6f2da8' },
      { name: 'Plum', hex: '#9b2d8a' },
      { name: 'Berry', hex: '#c2185b' },
      { name: 'Raspberry', hex: '#e30b5d' },
      { name: 'Candy Pink', hex: '#ff69b4' },
    ];

    const grid = document.getElementById('grid');
    const toast = document.getElementById('toast');
    let toastTimer;

    COLORS.forEach(({ name, hex }) => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'swatch';
      card.style.setProperty('--c', hex);
      card.title = `Copier ${hex}`;

      card.innerHTML = `
        <span class="icon-wrap">${ICON}</span>
        <span class="name">${name}</span>
        <span class="hex">${hex.toUpperCase()}</span>
      `;

      card.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(hex.toLowerCase());
        } catch {
          /* ignore */
        }
        card.classList.add('is-copied');
        toast.textContent = `${name} · ${hex.toUpperCase()} copié`;
        toast.classList.add('is-on');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.remove('is-on');
          card.classList.remove('is-copied');
        }, 1200);
      });

      grid.appendChild(card);
    });
  </script>
</body>
</html>
