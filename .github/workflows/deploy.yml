name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate Firebase config
        run: |
          cat > assets/js/firebase/config.js << 'EOF'
          import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
          import { getAuth } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
          import { getFirestore } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

          const firebaseConfig = {
            apiKey: '${{ secrets.FIREBASE_API_KEY }}',
            authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
            appId: '${{ secrets.FIREBASE_APP_ID }}',
          };

          export const app = initializeApp(firebaseConfig);
          export const auth = getAuth(app);
          export const db = getFirestore(app);
          EOF

      - name: Prepare site
        env:
          CACHE_VERSION: ${{ github.run_number }}
        run: |
          mkdir -p _site
          cp index.html site.webmanifest _site/
          cp -r assets pages _site/
          cp pages/*.html _site/
          touch _site/.nojekyll

          # Force le navigateur à recharger les modules JS à chaque deploy.
          # Sans ça, la prod peut garder un ancien firestore.js (sans espace démo).
          sed -i "s/app\.js?v=[^\"']*/app.js?v=${CACHE_VERSION}/" _site/index.html

          find _site/assets/js -name '*.js' -exec sed -i \
            -e "s|'\\./auth/session\\.js?v=[^']*'|'./auth/session.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\./auth/workspace\\.js?v=[^']*'|'./auth/workspace.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\./auth/workspace\\.js'|'./auth/workspace.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./auth/workspace\\.js?v=[^']*'|'../auth/workspace.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./auth/workspace\\.js'|'../auth/workspace.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./\\.\\./auth/workspace\\.js?v=[^']*'|'../../auth/workspace.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./\\.\\./auth/workspace\\.js'|'../../auth/workspace.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\./session\\.js?v=[^']*'|'./session.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\./session\\.js'|'./session.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./firebase/firestore\\.js?v=[^']*'|'../firebase/firestore.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./firebase/firestore\\.js'|'../firebase/firestore.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./\\.\\./firebase/firestore\\.js?v=[^']*'|'../../firebase/firestore.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./\\.\\./firebase/firestore\\.js'|'../../firebase/firestore.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\./firebase/dailyPicks\\.js?v=[^']*'|'./firebase/dailyPicks.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\./firebase/dailyPicks\\.js'|'./firebase/dailyPicks.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./firebase/dailyPicks\\.js?v=[^']*'|'../firebase/dailyPicks.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./firebase/dailyPicks\\.js'|'../firebase/dailyPicks.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./\\.\\./firebase/dailyPicks\\.js?v=[^']*'|'../../firebase/dailyPicks.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./\\.\\./firebase/dailyPicks\\.js'|'../../firebase/dailyPicks.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./lib/custom-types\\.js?v=[^']*'|'../lib/custom-types.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./lib/custom-types\\.js'|'../lib/custom-types.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./\\.\\./lib/custom-types\\.js?v=[^']*'|'../../lib/custom-types.js?v=${CACHE_VERSION}'|g" \
            -e "s|'\\.\\./\\.\\./lib/custom-types\\.js'|'../../lib/custom-types.js?v=${CACHE_VERSION}'|g" \
            {} +

          echo "Cache version: ${CACHE_VERSION}"
          echo "Fichiers déployés :"
          find _site -type f | sort

      - name: Verify demo workspace files
        run: |
          test -f _site/assets/js/auth/workspace.js
          grep -q "workspaces/demo" _site/assets/js/firebase/firestore.js
          grep -q "demo-space-banner" _site/assets/js/pages/accueil/pageController.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
