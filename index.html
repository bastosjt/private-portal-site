<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.gstatic.com https://apis.google.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' data:;
    connect-src 'self' https://www.gstatic.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api-adresse.data.gouv.fr https://photon.komoot.io;
    frame-src https://*.firebaseapp.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  ">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Our Space — your private space for two. Ideas, activities, restaurants and more.">
  <meta name="theme-color" content="#1f2229">
  <meta name="application-name" content="Our Space">
  <title>Our Space</title>
  <link rel="icon" href="assets/icons/favicon.png" type="image/png" sizes="283x283">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="site.webmanifest">
  <meta name="apple-mobile-web-app-title" content="Our Space">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="assets/css/variables.css?v=11">
  <link rel="stylesheet" href="assets/css/base.css?v=12">
  <link rel="stylesheet" href="assets/css/auth.css?v=6">
  <link rel="stylesheet" href="assets/css/layout.css?v=11">
  <link rel="stylesheet" href="assets/css/home.css?v=40">
  <link rel="stylesheet" href="assets/css/activities.css?v=63">
  <link rel="stylesheet" href="assets/css/add-item.css?v=14">
</head>
<body class="auth-page">
  <div id="auth-view">
    <div class="auth-container">
      <div class="auth-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
        </svg>
      </div>

      <header class="auth-header">
        <p>Connectez-vous à Our Space</p>
      </header>

      <form id="login-form" class="auth-form" novalidate>
        <div class="input-group">
          <span class="input-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="Adresse email"
            aria-label="Adresse email"
          >
        </div>

        <div class="input-group">
          <span class="input-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="Mot de passe"
            aria-label="Mot de passe"
          >
        </div>

        <p id="error-message" class="error hidden" role="alert"></p>

        <button type="submit" id="submit-btn" class="btn-primary">
          Se connecter
        </button>
      </form>

      <p class="app-version" id="app-version" aria-hidden="true"></p>
    </div>
  </div>

  <div id="app-view" class="app-shell hidden">
    <div id="sidebar-root"></div>
    <div id="page-root" class="app-main"></div>
  </div>

  <script type="module" src="assets/js/app.js?v=39"></script>
</body>
</html>
