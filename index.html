<body class="splash-page">
  <div id="splash-view" class="splash-view" role="status" aria-live="polite" aria-label="Chargement">
    <div class="love-hearts-field love-hearts-field--splash splash-corner-hearts" id="splash-corner-hearts" aria-hidden="true"></div>
    <div class="splash-content">
      <button type="button" class="splash-icon-wrap splash-heart-trigger" id="splash-heart-trigger" aria-label="Réveiller les cœurs">
        <span class="splash-loader-ring" aria-hidden="true"></span>
        <div class="splash-heart-ripples" aria-hidden="true">
          <span class="splash-heart-ripple love-ripple"></span>
          <span class="splash-heart-ripple love-ripple"></span>
          <span class="splash-heart-ripple love-ripple"></span>
        </div>
        <div class="splash-icon" id="splash-heart-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          </svg>
        </div>
      </button>
      <p class="splash-title">Our Space</p>
    </div>
  </div>

  <div id="auth-view" class="hidden">
    <div class="auth-container">
      <div class="auth-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
        </svg>
      </div>

      <header class="auth-header">
        <p>Connectez-vous à Our Space</p>
      </header>

      <form id="login-form" class="auth-form" novalidate>
        <div class="input-group">
          <span class="input-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="Adresse email"
            aria-label="Adresse email"
          >
        </div>

        <div class="input-group">
          <span class="input-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="Mot de passe"
            aria-label="Mot de passe"
          >
        </div>

        <p id="error-message" class="error hidden" role="alert"></p>

        <button type="submit" id="submit-btn" class="btn-primary">
          Se connecter
        </button>
      </form>
    </div>

    <p class="app-version" id="app-version" aria-hidden="true"></p>
  </div>

  <div id="app-view" class="app-shell hidden">
    <div id="sidebar-root"></div>
    <div id="page-root" class="app-main"></div>
    <div id="bottom-nav-root"></div>
  </div>
