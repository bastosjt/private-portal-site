<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="stylesheet" href="css/variables.css?v=5">
  <link rel="stylesheet" href="css/base.css?v=5">
  <link rel="stylesheet" href="css/auth.css?v=5">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </svg>
    </div>

    <header class="auth-header">
      <p>Connectez-vous à votre espace privé</p>
    </header>

    <form id="login-form" class="auth-form" novalidate>
      <div class="input-group">
        <span class="input-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </span>
        <input
          type="email"
          id="email"
          name="email"
          required
          autocomplete="email"
          placeholder="Adresse email"
          aria-label="Adresse email"
        >
      </div>

      <div class="input-group">
        <span class="input-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="Mot de passe"
          aria-label="Mot de passe"
        >
      </div>

      <p id="error-message" class="error hidden" role="alert"></p>

      <button type="submit" id="submit-btn" class="btn-primary">
        Se connecter
      </button>
    </form>
  </div>

  <script type="module">
    import { login, logout } from './js/auth.js?v=2';
    import { redirectIfLoggedIn, isAllowedUser } from './js/protected.js?v=2';

    redirectIfLoggedIn('accueil.html');

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');

    if (new URLSearchParams(window.location.search).get('error') === 'unauthorized') {
      errorEl.textContent = 'Accès non autorisé.';
      errorEl.classList.remove('hidden');
      window.history.replaceState({}, '', 'index.html');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Veuillez remplir tous les champs.';
        errorEl.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Connexion…';

      try {
        const { user } = await login(email, password);

        if (!isAllowedUser(user)) {
          await logout();
          errorEl.textContent = 'Accès non autorisé.';
          errorEl.classList.remove('hidden');
          return;
        }

        window.location.href = 'accueil.html';
      } catch (err) {
        console.error(err.code, err.message);

        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
          errorEl.textContent = 'Email ou mot de passe incorrect.';
        } else if (err.code === 'auth/too-many-requests') {
          errorEl.textContent = 'Trop de tentatives. Réessayez plus tard.';
        } else if (err.code === 'auth/invalid-email') {
          errorEl.textContent = 'Adresse email invalide.';
        } else {
          errorEl.textContent = 'Une erreur est survenue. Réessayez.';
        }

        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
